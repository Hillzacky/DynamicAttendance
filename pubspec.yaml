name: attendance_app
description: Employee Attendance Application
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Navigation
  go_router: ^12.0.0
  
  # Network
  dio: ^5.3.2
  retrofit: ^4.0.3
  
  # Local Storage
  flutter_secure_storage: ^9.0.0
  hive_flutter: ^1.1.0
  
  # UI Components
  table_calendar: ^3.0.9
  dotted_border: ^2.1.0
  flutter_animate: ^4.2.0+1
  shimmer: ^3.0.0
  lottie: ^2.6.0
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.7
  
  # Camera & Image
  camera: ^0.10.5+5
  image_picker: ^1.0.4
  file_picker: ^6.1.1
  
  # Location & Maps
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  flutter_map: ^6.0.1
  latlong2: ^0.9.0
  
  # Form & Validation
  reactive_forms: ^16.1.1
  
  # Utils
  intl: ^0.18.1
  permission_handler: ^11.0.1
  connectivity_plus: ^5.0.1
  uuid: ^4.1.0
  dartz: ^0.10.1
  get_it: ^7.6.4
  injectable: ^2.3.2
  
  # PDF
  flutter_pdfview: ^1.3.2
  pdf: ^3.10.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.6
  injectable_generator: ^2.4.1
  retrofit_generator: ^8.0.4
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/